quartodoc:
  package: codebook_lab
  dir: reference
  title: "API Reference"
  style: pkgdown
  parser: google
  render_interlinks: false
  sidebar: reference/_sidebar.yml
  sections:
    - title: "Experiment Types"
      desc: "Dataclasses describing experiment specs and the results each run returns."
      contents:
        - ExperimentSpec
        - ExperimentRunResult
        - AnnotationRunResult
        - MetricsRunResult
        - HumanReliabilityResult
        - HumanGroundTruthResult
    - title: "Experiment Functions"
      desc: "High-level entry points for running and sweeping experiments."
      contents:
        - run_experiment
        - run_experiment_grid
        - expand_param_grid
        - resolve_task_dir
    - title: "Lower-Level Workflow"
      desc: "Run annotation, scoring, and human-reliability steps independently."
      contents:
        - run_annotation
        - run_metrics
        - calculate_human_reliability
        - build_human_ground_truth
    - title: "Validation and Retry Helpers"
      desc: "Response parsing and retry utilities used inside the annotation loop."
      contents:
        - annotate.extract_json_response
        - annotate.normalize_retry_strategy
        - annotate.classify_text
    - title: "Example Tasks"
      desc: "Discover and copy the bundled starter tasks."
      contents:
        - list_example_tasks
        - get_example_task_dir
        - get_example_task_files
        - copy_example_task
    - title: "Prompts"
      desc: "Inspect built-in prompt wrappers and register custom ones."
      contents:
        - list_prompt_wrappers
        - get_prompt_wrapper
        - register_prompt_wrapper
        - PromptContext
    - title: "Ollama Helpers"
      desc: "Check on and start the local Ollama server and models."
      contents:
        - ensure_ollama_available
        - ensure_ollama_model
        - get_ollama_base_url

format:
  html:
    theme:
      light:
        - simplex
        - ../custom-light.scss
      dark:
        - simplex
        - ../custom-dark.scss
    fontsize: 110%
    linestretch: 1.5
    css:
      - styles.css
      - _version.css
    toc: true
    toc-depth: 3
    page-navigation: false
    link-external-newwindow: true
    include-after-body: _feedback.html
    header-includes:
      - <link rel="preconnect" href="https://fonts.googleapis.com">
      - <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      - <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
