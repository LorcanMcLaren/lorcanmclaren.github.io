project:
  type: website
  output-dir: ../docs/codebook-lab

# The API reference under reference/ is generated from codebook_lab's docstrings
# by `quartodoc build`. Run it before rendering (see the Makefile / README) —
# NOT as a Quarto pre-render hook, because quartodoc rewrites reference/ and the
# watched _sidebar.yml on every pass, which sends `quarto preview` into an
# endless re-render loop.
metadata-files:
  - reference/_sidebar.yml

